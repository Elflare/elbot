name: Translate user docs

on:
  push:
    branches:
      - main
    paths:
      - "README.zh-CN.md"
      - "CHANGELOG.md"
      - "docs/**/*.md"
      - "scripts/translate_docs.py"
      - "scripts/test_translate_docs.py"
      - ".github/workflows/docs-translate.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-translate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    name: Translate docs to English
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Test translation tooling
        run: python -m unittest discover -s scripts -p "test_*.py"

      - name: Translate changed docs
        env:
          TRANSLATE_LLM_API_KEY: ${{ secrets.TRANSLATE_LLM_API_KEY }}
          TRANSLATE_LLM_BASE_URL: ${{ secrets.TRANSLATE_LLM_BASE_URL }}
          TRANSLATE_LLM_MODEL: ${{ secrets.TRANSLATE_LLM_MODEL }}
        run: >-
          python scripts/translate_docs.py
          --changed-only
          --commit-each
          --base-ref "${{ github.event.before }}"
          --head-ref "${{ github.sha }}"
          --batch-size 8
          --parallel-batches 1
          --batch-delay 5
          --retries 5
          --timeout 240
