name: Docs

on:
  pull_request:
    paths:
      - "README.md"
      - "README.zh-CN.md"
      - "docs/**/*.md"
      - "docs.en/**/*.md"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "README.zh-CN.md"
      - "docs/**/*.md"
      - "docs.en/**/*.md"
      - ".github/workflows/docs.yml"
  workflow_run:
    workflows:
      - Translate user docs
    types:
      - completed

permissions:
  contents: read

jobs:
  links:
    name: Check Markdown links
    runs-on: ubuntu-latest
    if: >-
      (github.event_name != 'push' || github.actor != 'github-actions[bot]') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check translated docs completeness
        id: translated-docs
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          sources = [Path('README.zh-CN.md'), *sorted(Path('docs').glob('**/*.md'))]
          missing = []
          for source in sources:
              target = Path('README.md') if source.as_posix() == 'README.zh-CN.md' else Path('docs.en') / source.relative_to('docs')
              if not target.exists():
                  missing.append(target.as_posix())
          print('complete=' + ('false' if missing else 'true'))
          if missing:
              print('missing<<EOF')
              print('\n'.join(missing))
              print('EOF')
          PY

      - name: Report incomplete translated docs
        if: steps.translated-docs.outputs.complete != 'true'
        run: |
          echo "Translated docs are incomplete; skipping link check until translation workflow completes."
          echo "Missing translated files:"
          echo "${{ steps.translated-docs.outputs.missing }}"

      - name: Collect Markdown files
        if: steps.translated-docs.outputs.complete == 'true'
        id: markdown-files
        run: |
          files=$({
            echo "README.md"
            echo "README.zh-CN.md"
            find docs devdocs -name '*.md' -print
            if [ -d docs.en ]; then
              find docs.en -name '*.md' -print
            fi
          } | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Check links
        if: steps.translated-docs.outputs.complete == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude "^<your-elbot-repo-url>$"
            --exclude "^https://api\.sgroup\.qq\.com"
            ${{ steps.markdown-files.outputs.files }}
          fail: true
