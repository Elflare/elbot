name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: "" }
          - { goos: linux,   goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: darwin,  goarch: arm64, ext: "" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-X main.version=${GITHUB_REF_NAME}" -o "elbot${{ matrix.ext }}" ./cmd/elbot

      - name: Archive
        run: |
          mkdir -p assets
          archive="elbot-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "assets/${archive}.zip" "elbot${{ matrix.ext }}"
          else
            tar czf "assets/${archive}.tar.gz" elbot
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: elbot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: assets

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Collect assets
        run: |
          mkdir -p release-assets
          echo "--- dist contents ---"
          ls -la dist 2>/dev/null || echo "(dist missing)"
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \; 2>/dev/null || true
          echo "--- release-assets contents ---"
          ls -la release-assets
          if [ -z "$(ls -A release-assets 2>/dev/null)" ]; then
            echo "ERROR: no artifacts found in dist" >&2
            exit 1
          fi

      - name: Generate checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum \
            | sed 's|  \./|  |' > SHA256SUMS

      - name: Extract release notes from CHANGELOG
        run: |
          tag="${GITHUB_REF_NAME}"
          extract_section() {
            local file="$1"
            awk -v tag="$tag" '
              /^## \[/ {
                header=$0
                sub(/^## \[/, "", header)
                sub(/\].*/, "", header)
                sub(/ - .*/, "", header)
                f = (header == tag)
              }
              f { print }
            ' "$file"
          }
          extract_section CHANGELOG.md > release-notes.md
          if [ -f CHANGELOG.en.md ]; then
            en_notes=$(extract_section CHANGELOG.en.md)
            if [ -n "$en_notes" ]; then
              printf '\n---\n\n' >> release-notes.md
              printf '%s\n' "$en_notes" >> release-notes.md
            fi
          else
            echo "WARNING: CHANGELOG.en.md missing; release notes will be Chinese-only." >&2
          fi
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section for ${tag}; using tag name as fallback." >&2
            echo "Release ${tag}." > release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--notes-file release-notes.md)
          if [[ "${GITHUB_REF_NAME}" =~ -(alpha|beta|rc|pre) ]]; then
            args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/*.tar.gz release-assets/*.zip release-assets/SHA256SUMS \
            "${args[@]}"
