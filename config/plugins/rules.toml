# Declarative Hook rules. This file is loaded at ElBot startup.
# Rules are for Hook behavior that does not need custom code. Complex logic should be a code plugin.
#
# Supported hook points:
# - platform.connected
# - platform.message.received
# - agent.input.prepared
# - llm.request.prepared
# - llm.response.received
# - tool.call.prepared
# - tool.call.completed
# - agent.output.prepared
# - platform.message.sent
# - error.occurred
#
# Common rule fields:
# - name: stable log/debug name.
# - on: hook point above.
# - enabled: optional, defaults to true.
# - priority: optional, defaults to 1000. Smaller values run first. Same priority keeps config order.
# - matches: required. Every hook must explicitly declare when it should run.
#
# Supported match ops:
# - always: run every time this hook point occurs. Must not set field or value.
# - exists: field must be non-empty.
# - contains: field contains value.
# - fullmatch: field equals value.
# - startswith: field starts with value.
# - endswith: field ends with value.
# - regex: field matches value as a Go regexp.
#
# Common match fields:
# - platform.name, platform.scope_id, platform.user_id, platform.conversation_id
# - platform.message_id, platform.reply_to_message_id
# - actor.id, actor.user_id, actor.role, actor.display_name
# - session.id, session.mode, session.status
# - request.id, request.kind, request.phase
# - message.text, message.content_text, message.role
# - llm.text, llm.raw_text, llm.latest_user_text, llm.latest_user_content_text, llm.provider, llm.model
# - tool.name, tool.arguments, tool.result, tool.risk
#
# Multiple [[rules.matches]] entries are AND conditions.
# Platform filters are regular matches, for example:
# [[rules.matches]]
# field = "platform.name"
# op = "fullmatch"
# value = "qqonebot"
#
# To intentionally run on every event at the hook point, declare:
# [[rules.matches]]
# op = "always"
#
# Supported action types:
# - prepend: add text before a field.
# - append: add text after a field.
# - replace: replace a regular expression match in a field. Set all = true to replace every match; default replaces the first match.

# - delete: remove match, or text when match is empty, from a field.
# - send: append an output intent to this hook event.
# - tool: call a low-risk/no-confirm tool and expose its result to later actions.
#
# Editable fields and limits:
# - platform.message.received / agent.input.prepared: field = "message.text" only.
# - llm.request.prepared: field = "llm.latest_user_text" only. This is synced into the persisted user message.
# - llm.response.received: field = "llm.text" or "llm.raw_text".

# - tool.call.prepared: field = "tool.arguments" only.
# - tool.call.completed: field = "tool.result" only.
# - agent.output.prepared / platform.message.sent: field = "message.text" only when the message role is assistant.

#
# Template variables:
# - {{platform.name}}, {{platform.scope_id}}, {{platform.user_id}}
# - {{actor.id}}, {{actor.user_id}}
# - {{message.text}}, {{message.content_text}}
# - {{llm.text}}, {{llm.raw_text}}, {{llm.latest_user_text}}, {{llm.latest_user_content_text}}

# - {{tool.arguments}}, {{tool.result}}
# - {{actions.<name>.result}}, {{actions.<name>.error}} from earlier tool actions.
#
# send action fields:
# - kind: text, image, file, emoticon, at. Defaults to text.
# - text: text content, emoticon name, at user id, or fallback label.
# - path: local image/file path for image/file/emoticon.
# - target.platform: optional. Defaults to source platform; platform.connected defaults to the connected platform.
# - target.scope_id: optional, for platforms that support scope routing, such as private:123 or group:456.
# - target.private_user_id: optional explicit private target.
# - target.group_id: optional explicit group target.
# - target.superadmins: send to configured superadmins for the target platform.
#
# tool action fields:
# - name: variable name used by later actions.
# - tool: registered tool name.
# - arguments: JSON argument string. Templates are expanded before execution.
# Tool actions obey the security policy. Calls requiring interactive confirmation are rejected and audited.

# Example: notify qqonebot superadmins after OneBot connects.
[[rules]]
name = "notify_qqonebot_connected"
on = "platform.connected"
priority = 1000

[[rules.matches]]
field = "platform.name"
op = "fullmatch"
value = "qqonebot"

[[rules.actions]]
type = "send"
kind = "text"
text = "ElBot 已连接 QQ OneBot。"
target.superadmins = true

