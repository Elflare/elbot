# Main application config example. Relative paths are resolved from this file.

[config_files]
providers = "providers.toml"
state = "state.toml"
elnis = "elnis.toml"
tool_tags = "tool_tags.toml"

[storage]
# 留空使用平台默认数据目录：Windows %APPDATA%/ElBot/data；Linux $XDG_DATA_HOME/elbot 或 ~/.local/share/elbot。
sessions_sqlite_path = ""
chat_history_sqlite_path = ""

[runtime]
log_level = "info"
log_retention_days = 30

[maintenance.log_cleanup]
enabled = true
schedule = "0 3 * * *"

[maintenance.artifact_cleanup]
enabled = true
schedule = "0 4 * * *"

[maintenance.chat_history_cleanup]
enabled = true
schedule = "0 35 4 * * *"
retention_days = 180

[sandbox]
# 留空使用平台默认数据目录下的 sandbox 子目录。
root = ""

[artifact]
retention_days = 7
max_direct_base64_bytes = 8388608
# base64 会使传输体积增加约 33%，建议不要超过 8-16 MiB；更大的文件建议使用未来的 S3/R2 backend。
backend = "base64"
s3_endpoint = ""
s3_region = "auto"
s3_bucket = ""
s3_access_key_env = "ELBOT_S3_ACCESS_KEY_ID"
s3_secret_key_env = "ELBOT_S3_SECRET_ACCESS_KEY"
s3_public_base_url = ""

[llm_request]
timeout_seconds = 60
max_retries = 3
retry_initial_delay_seconds = 2

[context]

compact_enabled = true
compact_trigger_ratio = 0.8

[soul]
path = "SOUL.md"

[view]
session_list_page_size = 10

[commands]
prefixes = ["/"]

[tools]
max_rounds_per_turn = 10

[security]
user_max_tool_risk = "low"
superadmin_confirm_risk = "high"

[security.superadmins]
cli = ["local"]

[session]
non_superadmin_idle_ttl_minutes = 10

[session.naming]
trigger_step = 3

[session.cleanup]
enabled = false
retention_days = 30

[platform.cli]
enabled = true

