# Elnis listening hub config example. Loaded from app.toml [config_files].elnis.

enabled = false
# 默认允许 Elwisp 预加载的 ElBot 内部工具；未单独配置的 Elwisp 继承这里。
allowed_tools = ["web_search", "web_extract"]
[http]
addr = "127.0.0.1:32170"
max_body_bytes = 1048576
queue_size = 128
workers = 2

[tokens.home]
# 从系统环境变量或配置目录 .env 读取。
token_env = ["ELNIS_HOME_TOKEN", "ELNIS_HOME_TOKEN_ALT"]

# 默认允许投递；只有这里显式列出的目标会被禁止。
# 配置中的 platform-only 表示禁用整个平台所有投递。
[delivery_disabled]
targets = [
  # { platform = "telegram" },
  # { platform = "telegram", type = "private", id = "123456789" },
  # { platform = "qqonebot", type = "group", id = "987654321" },
]

# Elwisp 默认启用；只有需要限制 token、覆盖策略或禁用时才配置。
[elwisps.server-watchdog]
allowed_tokens = ["home"]
# 存在时覆盖顶层 allowed_tools；未配置时继承顶层默认。
allowed_tools = ["shell", "web_search"]
# 外部工具默认允许；这里可禁用该 Elwisp 声明的指定外部工具。
disabled_external_tools = ["danger_tool"]
# 单个 Elwisp 的额外投递禁止项；语义同 delivery_disabled.targets。
disabled_targets = [
  # { platform = "qqonebot", type = "group", id = "987654321" },
]

[elwisps.spike-checker]
enabled = false
